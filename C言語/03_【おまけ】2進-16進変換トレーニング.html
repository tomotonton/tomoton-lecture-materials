<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2進数・16進数変換トレーニング</title>
  <style>
    body { font-family: system-ui; margin: 0; padding: 16px; background:#f6f7f9; }
    .app { max-width:720px; margin:auto; background:#fff; padding:20px; border-radius:12px; }
    h1 { font-size:1.4rem; }
    .question { font-size:2.4rem; text-align:center; margin:12px 0; }
    .mode { text-align:center; color:#555; }
    input { font-size:1.6rem; text-align:center; width:160px; }
    .btns { display:flex; justify-content:center; gap:8px; flex-wrap:wrap; margin-top:10px; }
    button { padding:10px 14px; font-size:1rem; }
    .keypad { display:flex; justify-content:center; gap:8px; flex-wrap:wrap; margin-top:10px; }
    .keypad button { font-size:1.2rem; width:60px; }
    .result { text-align:center; font-weight:bold; min-height:2em; }
  </style>
</head>
<body>
  <div class="app">
    <h1>2進数・16進数トレーニング</h1>

    <div class="mode" id="mode"></div>
    <div class="question" id="question"></div>

    <div style="text-align:center">
      <input id="answer" inputmode="numeric" />
    </div>

    <div class="keypad" id="keypad"></div>

    <div class="btns">
      <button onclick="check()">判定</button>
      <button onclick="nextQ()">次</button>
      <button onclick="clearInput()">クリア</button>
    </div>

    <div class="result" id="result"></div>

    <div style="text-align:center;margin-top:10px">
      正解: <span id="c">0</span> / 回答: <span id="a">0</span>
    </div>
  </div>

<script>
const HEX="0123456789ABCDEF";
let q={},answered=false;

function bin4(h){return parseInt(h,16).toString(2).padStart(4,'0');}

function nextQ(){
  const h=HEX[Math.floor(Math.random()*16)];
  const b=bin4(h);
  if(Math.random()<0.5){
    q={p:h,a:b,m:"16→2"};
  }else{
    q={p:b,a:h,m:"2→16"};
  }
  answered=false;
  document.getElementById("mode").textContent=q.m;
  document.getElementById("question").textContent=q.p;
  document.getElementById("answer").value="";
  document.getElementById("result").textContent="";
}

function check(){
  if(answered)return;
  const v=document.getElementById("answer").value.replace(/\s/g,"").toUpperCase();
  const ok=v===q.a;
  save(ok);
  answered=true;
  document.getElementById("result").textContent=ok?"正解":"不正解→"+q.a;
  setTimeout(nextQ,1000);
}

function clearInput(){document.getElementById("answer").value="";}

function buildKeypad(){
  const k=document.getElementById("keypad");
  "01ABCDEF←".split("").forEach(c=>{
    const b=document.createElement("button");
    b.textContent=c;
    b.onclick=()=>{
      const i=document.getElementById("answer");
      if(c==='←'){i.value=i.value.slice(0,-1);}else{i.value+=c;}
    };
    k.appendChild(b);
  });
}

function load(){return JSON.parse(localStorage.getItem('bh')||'[]');}
function save(ok){
  const now=Date.now();
  const d=load().filter(x=>now-x.t<86400000);
  d.push({t:now,o:ok});
  localStorage.setItem('bh',JSON.stringify(d));
  update();
}

function update(){
  const d=load().filter(x=>Date.now()-x.t<86400000);
  localStorage.setItem('bh',JSON.stringify(d));
  const a=d.length;
  const c=d.filter(x=>x.o).length;
  document.getElementById('a').textContent=a;
  document.getElementById('c').textContent=c;
}

buildKeypad();
update();
nextQ();
</script>
</body>
</html>
